<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0f"/>
      <stop offset="100%" stop-color="#2d0f1a"/>
    </linearGradient>
    <linearGradient id="cake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="frosting" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#ffe0e0"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="60%" stop-color="#ffc312"/>
      <stop offset="100%" stop-color="#fff5a0"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="60%" stop-color="#ffc312"/>
      <stop offset="100%" stop-color="#fff5a0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle glow ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="195" fill="none" stroke="#ff9f43" stroke-width="0.8" opacity="0.1"/>

  <!-- Confetti dots -->
  <circle cx="120" cy="130" r="10" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="160" cy="100" r="6" fill="#ffc312" opacity="0.6"/>
  <circle cx="390" cy="120" r="8" fill="#48dbfb" opacity="0.6"/>
  <circle cx="420" cy="155" r="5" fill="#ff9f43" opacity="0.7"/>
  <circle cx="100" cy="390" r="7" fill="#ffc312" opacity="0.5"/>
  <circle cx="410" cy="380" r="9" fill="#ff6b6b" opacity="0.5"/>
  <rect x="130" y="370" width="10" height="10" rx="2" fill="#48dbfb" opacity="0.5" transform="rotate(30 135 375)"/>
  <rect x="375" y="135" width="10" height="10" rx="2" fill="#ff6b6b" opacity="0.5" transform="rotate(45 380 140)"/>
  <rect x="90" y="200" width="8" height="8" rx="1" fill="#ffc312" opacity="0.4" transform="rotate(20 94 204)"/>
  <rect x="415" y="270" width="8" height="8" rx="1" fill="#48dbfb" opacity="0.4" transform="rotate(55 419 274)"/>

  <!-- ═══ CAKE ═══ -->

  <!-- Cake bottom tier -->
  <rect x="128" y="318" width="256" height="90" rx="14" fill="url(#cake)"/>
  <!-- Bottom tier stripe -->
  <rect x="128" y="346" width="256" height="10" fill="#ff6b6b" opacity="0.3"/>
  <rect x="128" y="366" width="256" height="10" fill="#ff9f43" opacity="0.2"/>

  <!-- Bottom tier frosting drips -->
  <path d="M128 318 Q148 300 168 318 Q188 300 208 318 Q228 300 248 318 Q268 300 288 318 Q308 300 328 318 Q348 300 368 318 Q388 300 408 318 L384 318 L128 318Z" fill="url(#frosting)" opacity="0.95"/>

  <!-- Cake top tier -->
  <rect x="168" y="232" width="176" height="90" rx="12" fill="#ff8c5a"/>
  <!-- Top tier stripe -->
  <rect x="168" y="258" width="176" height="8" fill="#ff6b6b" opacity="0.3"/>
  <rect x="168" y="274" width="176" height="8" fill="#ff9f43" opacity="0.2"/>

  <!-- Top tier frosting drips -->
  <path d="M168 232 Q185 215 202 232 Q219 215 236 232 Q253 215 270 232 Q287 215 304 232 Q321 215 338 232 Q344 232 344 232 L168 232Z" fill="url(#frosting)" opacity="0.95"/>

  <!-- Plate / base shadow -->
  <ellipse cx="256" cy="408" rx="135" ry="12" fill="#ff6b6b" opacity="0.2"/>

  <!-- ═══ CANDLES ═══ -->

  <!-- Candle 1 (left) -->
  <rect x="207" y="195" width="18" height="42" rx="5" fill="#48dbfb"/>
  <rect x="207" y="195" width="18" height="8" rx="3" fill="#48dbfb" opacity="0.6"/>
  <!-- Flame 1 -->
  <ellipse cx="216" cy="187" rx="7" ry="11" fill="url(#flame1)"/>
  <ellipse cx="216" cy="191" rx="4" ry="6" fill="#fff5a0" opacity="0.8"/>

  <!-- Candle 2 (center) -->
  <rect x="247" y="188" width="18" height="48" rx="5" fill="#ffc312"/>
  <rect x="247" y="188" width="18" height="8" rx="3" fill="#ffc312" opacity="0.6"/>
  <!-- Flame 2 (taller - center) -->
  <ellipse cx="256" cy="179" rx="8" ry="13" fill="url(#flame1)"/>
  <ellipse cx="256" cy="184" rx="4.5" ry="7" fill="#fff5a0" opacity="0.8"/>

  <!-- Candle 3 (right) -->
  <rect x="287" y="195" width="18" height="42" rx="5" fill="#ff6b6b"/>
  <rect x="287" y="195" width="18" height="8" rx="3" fill="#ff6b6b" opacity="0.6"/>
  <!-- Flame 3 -->
  <ellipse cx="296" cy="187" rx="7" ry="11" fill="url(#flame2)"/>
  <ellipse cx="296" cy="191" rx="4" ry="6" fill="#fff5a0" opacity="0.8"/>

  <!-- Dots on cake tiers -->
  <circle cx="185" cy="285" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="210" cy="275" r="4" fill="#ffc312" opacity="0.5"/>
  <circle cx="235" cy="285" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="260" cy="275" r="4" fill="#48dbfb" opacity="0.5"/>
  <circle cx="285" cy="285" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="310" cy="275" r="4" fill="#ffc312" opacity="0.5"/>
  <circle cx="335" cy="285" r="5" fill="#fff" opacity="0.3"/>

  <circle cx="155" cy="365" r="6" fill="#fff" opacity="0.25"/>
  <circle cx="190" cy="355" r="5" fill="#ffc312" opacity="0.4"/>
  <circle cx="225" cy="365" r="6" fill="#fff" opacity="0.25"/>
  <circle cx="260" cy="355" r="5" fill="#48dbfb" opacity="0.4"/>
  <circle cx="295" cy="365" r="6" fill="#fff" opacity="0.25"/>
  <circle cx="330" cy="355" r="5" fill="#ffc312" opacity="0.4"/>
  <circle cx="360" cy="365" r="6" fill="#fff" opacity="0.25"/>

  <!-- Bell / notification badge (top right) -->
  <circle cx="390" cy="90" r="38" fill="#ff6b6b" opacity="0.15"/>
  <circle cx="390" cy="90" r="28" fill="#ff6b6b" opacity="0.2"/>

  <!-- Stars scattered -->
  <text x="108" y="165" font-size="18" fill="#ffc312" opacity="0.6">✦</text>
  <text x="390" y="190" font-size="14" fill="#48dbfb" opacity="0.5">✦</text>
  <text x="80" y="320" font-size="12" fill="#ff9f43" opacity="0.4">✦</text>
  <text x="430" y="320" font-size="16" fill="#ffc312" opacity="0.4">✦</text>
</svg>
